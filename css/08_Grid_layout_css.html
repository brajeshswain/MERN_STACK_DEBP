<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid layout</title>
    <style>
        .container{
            background-color: rgb(32, 210, 237);
             height: 400px;
            display: grid;
            grid-gap:100px;
           
            /* grid-template-columns: 100px 200px 300px; */
            grid-template-columns: 100fr 100fr 100fr 100fr;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
        }
        
        .item{
            background-color: orange;
            color:aqua;
            border: 4px solid black;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <h1>Grid Layout</h1>
    <h2><div class="container">
        
        <div class="item item1">Santosh bisakh</div>
        <div class="item item2">Benudhar behera</div>
        <div class="item item3">malaya ranjan rout</div>
        <div class="item item4">Nigamanada mahapartra</div>
        <div class="item item5">Abhishek parida</div>
        <div class="item item6">satya shree bhusan rout</div>
        <div class="item item7"> swadhin kumar beura</div>
        <div class="item item8">satya prakash parija</div>
       
    

    </div></h2>
    
</body>
</html>
