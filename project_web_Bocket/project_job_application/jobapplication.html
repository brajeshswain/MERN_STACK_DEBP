<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="jobapplication.css">
</head>

<body>
    <div class="contanier">
        <!-- <section> -->
            <div class="head_contanier">
                <h1>Job Application
                    <span> (Web)</span>
                </h1>
                <!-- </div> -->
                <!-- </section>
        <section> -->
                <form>
                    <div class="form_contanier">

                        <div class="fn_contanier">
                            <label for="fname"><B>First Name</B></label>
                            <input type="text" placeholder="First Name" id="fname">
                        </div>

                        <div class="fn_contanier">
                            <label for="lname"><b>Last Name</b></label>
                            <input type="text" placeholder="Last Name" id="lname">
                        </div>

                        <div class="fn_contanier">
                            <label for="Email"><b>Email</b></label>
                            <input type="email" id="Email" placeholder="Enter ur Email">
                        </div>

                        <div class="fn_container">
                            <label for="Job Role"> Job Role</label>
                            <select name="Job Role" id="Job Role">
                                <option value="" disabled selected>select job Role </option>
                                <option value="sd">Software Developer</option>
                                <option value="Ds"> Data Scientist</option>
                                <option value="Ca"> Cloud Architect</option>
                                <option value="Can">Cybersecurity Analyst </option>
                                <option value="Ip"> IT Project Manager</option>
                            </select>
                        </div>

                        <div class="txt_conatanier">
                            <label for="Address">Address</label>
                            <textarea name="Address" id="Address" placeholder="Enter your permanet  Address" rowa="30"
                                cols="60"></textarea>
                        </div>

                        <div class="fn_container">
                            <label for="city">city</label>
                            <input type="text" name="city" id="city" placeholder="Enter your city">
                        </div>

                        <div class="fn_container">
                            <label for="pin">Pincode</label>
                            <input type="number" id="pin" placeholder="Enter Your Pincode" max="5">
                        </div>

                        <div class="fn_contanier">
                            <label for="date">Start Date</label>
                            <input type="date" id="date" placeholder="your start Date">
                        </div>

                        <div class="fn_contanier">
                            <label for="cv">Upload Your CV</label>
                            <input type="file" id="cv" placeholder="No file chosen">
                        </div>

                        <div class="button_contanier">
                            <button type="sumbit">
                                Apply Now
                            </button>
                        </div>




                    </div>

                </form>
            </div>
        <!-- </section> -->



    </div>
</body>

</html>
